[tasks]
border  = { fg = "#8caaee" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#414559" }
cand            = { fg = "#81c8be" }
rest            = { fg = "#949cbb" }
desc            = { fg = "#f4b8e4" }
separator       = " ¯¬£ "
separator_style = { fg = "#626880" }

[help]
