# Count
count_copied   = { fg = "#303446", bg = "#a6d189" }
count_cut      = { fg = "#303446", bg = "#e78284" }
count_selected = { fg = "#303446", bg = "#8caaee" }

# Border
border_symbol = "Ôöé"
border_style  = { fg = "#838ba7" }

# Highlighting
syntect_theme = "~/.config/yazi/Catppuccin-frappe.tmTheme"

[status]
separator_open  = "¯éÂ"
separator_close = "¯é┤"
